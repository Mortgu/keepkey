<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Global Search" subtitle="Suchleiste mit Ergebnis-Panel, gefiltert über Tabs (Alle, Angebote, Rechnungen, Kunden, Bestellungen)" viewport="640x460" -->
<html lang="de">
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: #F7F8F7; -webkit-font-smoothing: antialiased; color:#111A14; }
  #root { padding: 40px; display: flex; justify-content: center; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const T = {
  green600:'#00683F', green50:'#E6F2EC', green100:'#D4EDE1',
  neutral25:'#F7F8F7', neutral50:'#F0F4F1', neutral100:'#E0E4E1', neutral200:'#C4CFC8',
  neutral300:'#8A9E93', neutral500:'#4B5C52', neutral900:'#111A14', white:'#FFFFFF',
  red:'#C0392B', yellow:'#B45309',
};

const Ico = {
  search:  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
  clear:   <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
  offer:   <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="13" y2="17"/></svg>,
  invoice: <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="12" y2="16"/></svg>,
  customer:<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
  order:   <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>,
  clock:   <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
  empty:   <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
};

const TYPE_META = {
  offer:    { label:'Angebot',    icon:Ico.offer,    color:T.green600 },
  invoice:  { label:'Rechnung',   icon:Ico.invoice,  color:T.yellow },
  customer: { label:'Kunde',      icon:Ico.customer, color:'#4B7CBF' },
  order:    { label:'Bestellung', icon:Ico.order,    color:'#8A5FBF' },
};

const RESULTS = [
  { id:1,  type:'offer',    title:'Angebot #A-2024-118', meta:'Bahlsen GmbH · 12.450 €',        date:'vor 2 Std.' },
  { id:2,  type:'customer', title:'Bahlsen GmbH',         meta:'Kunde seit 2019 · Hannover',      date:'' },
  { id:3,  type:'invoice',  title:'Rechnung #R-2024-0342',meta:'Bahlsen GmbH · fällig 30.07.',    date:'gestern' },
  { id:4,  type:'offer',    title:'Angebot #A-2024-119',  meta:'Ferrero Deutschland · 8.200 €',   date:'vor 4 Std.' },
  { id:5,  type:'order',    title:'Bestellung #B-2024-771',meta:'Ferrero Deutschland · 3 Positionen', date:'vor 1 Tag' },
  { id:6,  type:'customer', title:'Ferrero Deutschland GmbH', meta:'Kunde seit 2021 · Frankfurt', date:'' },
  { id:7,  type:'invoice',  title:'Rechnung #R-2024-0338', meta:'Katjes International · bezahlt', date:'vor 3 Tagen' },
  { id:8,  type:'offer',    title:'Angebot #A-2024-104',   meta:'Katjes International · 5.900 €', date:'vor 5 Tagen' },
];

const RECENT = ['Bahlsen', 'Rechnung #R-2024-0342', 'Ferrero'];

const highlight = (text, q) => {
  if (!q) return text;
  const i = text.toLowerCase().indexOf(q.toLowerCase());
  if (i === -1) return text;
  return <>{text.slice(0,i)}<mark style={{ background:T.green100, color:T.green600, borderRadius:2, padding:'0 1px' }}>{text.slice(i,i+q.length)}</mark>{text.slice(i+q.length)}</>;
};

const ResultRow = ({ r, q }) => {
  const meta = TYPE_META[r.type];
  const [hover, setHover] = React.useState(false);
  return (
    <div onMouseEnter={()=>setHover(true)} onMouseLeave={()=>setHover(false)} style={{
      display:'flex', alignItems:'center', gap:12, padding:'9px 16px', cursor:'pointer',
      background: hover ? T.neutral50 : 'transparent', transition:'background 80ms',
    }}>
      <div style={{ width:30, height:30, borderRadius:7, background:T.neutral50, color:meta.color, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
        {meta.icon}
      </div>
      <div style={{ flex:1, minWidth:0 }}>
        <div style={{ fontSize:13.5, fontWeight:500, color:T.neutral900, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>
          {highlight(r.title, q)}
        </div>
        <div style={{ fontSize:12, color:T.neutral300, marginTop:1, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>
          {meta.label} · {highlight(r.meta, q)}
        </div>
      </div>
      {r.date && <div style={{ fontSize:11, color:T.neutral300, flexShrink:0 }}>{r.date}</div>}
    </div>
  );
};

const GlobalSearch = () => {
  const [open, setOpen] = React.useState(false);
  const [query, setQuery] = React.useState('');
  const [tab, setTab] = React.useState('all');
  const wrapRef = React.useRef(null);
  const tabRefs = React.useRef({});
  const [indicator, setIndicator] = React.useState(null);

  React.useEffect(() => {
    const handler = e => { if (wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, []);

  const filtered = React.useMemo(() => {
    const q = query.trim().toLowerCase();
    return RESULTS.filter(r => (!q || r.title.toLowerCase().includes(q) || r.meta.toLowerCase().includes(q)) && (tab==='all' || r.type===tab));
  }, [query, tab]);

  const counts = React.useMemo(() => {
    const q = query.trim().toLowerCase();
    const base = RESULTS.filter(r => !q || r.title.toLowerCase().includes(q) || r.meta.toLowerCase().includes(q));
    return {
      all: base.length,
      offer: base.filter(r=>r.type==='offer').length,
      invoice: base.filter(r=>r.type==='invoice').length,
      customer: base.filter(r=>r.type==='customer').length,
      order: base.filter(r=>r.type==='order').length,
    };
  }, [query]);

  const tabs = [
    { key:'all', label:'Alle' },
    { key:'offer', label:'Angebote' },
    { key:'invoice', label:'Rechnungen' },
    { key:'customer', label:'Kunden' },
    { key:'order', label:'Bestellungen' },
  ];

  React.useLayoutEffect(() => {
    const el = tabRefs.current[tab];
    if (el) setIndicator({ left: el.offsetLeft, width: el.offsetWidth });
  }, [tab, open]);

  const showEmpty = query.trim().length > 0 && filtered.length === 0;
  const showRecent = query.trim().length === 0;

  return (
    <div ref={wrapRef} style={{ position:'relative', width:480 }}>
      <div style={{
        display:'flex', alignItems:'center', gap:9, padding:'9px 12px',
        background:T.white, borderRadius:8,
        border:`1px solid ${open ? T.green600 : T.neutral100}`,
        boxShadow: open ? '0 0 0 3px rgba(0,104,63,0.12)' : 'none',
        transition:'border-color 120ms, box-shadow 120ms',
      }}>
        <span style={{ display:'flex', color:T.neutral300, flexShrink:0 }}>{Ico.search}</span>
        <input
          value={query}
          onFocus={()=>setOpen(true)}
          onChange={e=>{ setQuery(e.target.value); setOpen(true); }}
          placeholder="Angebote, Rechnungen, Kunden durchsuchen…"
          style={{ flex:1, border:'none', outline:'none', fontFamily:'inherit', fontSize:13.5, color:T.neutral900, background:'transparent' }}
        />
        {query && (
          <button onClick={()=>setQuery('')} style={{ display:'flex', background:'none', border:'none', cursor:'pointer', color:T.neutral300, padding:2, borderRadius:4, flexShrink:0 }}>
            {Ico.clear}
          </button>
        )}
        {!query && <span style={{ fontSize:11, color:T.neutral300, border:`1px solid ${T.neutral100}`, borderRadius:4, padding:'1px 6px', flexShrink:0 }}>⌘K</span>}
      </div>

      {open && (
        <div style={{
          position:'absolute', top:'calc(100% + 6px)', left:0, right:0, zIndex:50,
          background:T.white, border:`1px solid ${T.neutral100}`, borderRadius:10,
          boxShadow:'0 12px 32px rgba(0,0,0,0.14)', overflow:'hidden',
        }}>
          {/* Tabs */}
          <div style={{ position:'relative', display:'flex', gap:2, padding:'8px 10px 0', borderBottom:`1px solid ${T.neutral100}` }}>
            {tabs.map(tb => {
              const on = tab===tb.key;
              const count = counts[tb.key];
              return (
                <button key={tb.key} ref={el=>tabRefs.current[tb.key]=el} onClick={()=>setTab(tb.key)}
                  style={{
                    display:'flex', alignItems:'center', gap:6, fontFamily:'inherit',
                    fontSize:12.5, fontWeight: on?600:500, padding:'7px 10px',
                    background:'none', border:'none', cursor:'pointer',
                    color: on ? T.neutral900 : T.neutral300,
                    transition:'color 120ms',
                  }}>
                  {tb.label}
                  <span style={{
                    fontSize:10.5, fontWeight:600, padding:'0px 5px', borderRadius:9999,
                    background: on ? T.green50 : T.neutral50,
                    color: on ? T.green600 : T.neutral300,
                  }}>{count}</span>
                </button>
              );
            })}
            {indicator && (
              <span style={{ position:'absolute', bottom:-1, height:2, background:T.green600, borderRadius:2,
                left:indicator.left, width:indicator.width, transition:'left 200ms cubic-bezier(0.4,0,0.2,1), width 200ms cubic-bezier(0.4,0,0.2,1)' }}/>
            )}
          </div>

          {/* Body */}
          <div style={{ maxHeight:340, overflowY:'auto', padding:'6px 0' }}>
            {showRecent && (
              <>
                <div style={{ padding:'8px 16px 4px', fontSize:10, fontWeight:600, color:T.neutral300, textTransform:'uppercase', letterSpacing:'0.06em' }}>Zuletzt gesucht</div>
                {RECENT.map(r => (
                  <div key={r} onClick={()=>setQuery(r)} style={{ display:'flex', alignItems:'center', gap:10, padding:'7px 16px', cursor:'pointer', fontSize:13, color:T.neutral500 }}
                    onMouseEnter={e=>e.currentTarget.style.background=T.neutral50}
                    onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                    <span style={{ display:'flex', color:T.neutral300 }}>{Ico.clock}</span>{r}
                  </div>
                ))}
              </>
            )}

            {!showRecent && !showEmpty && filtered.map(r => <ResultRow key={r.id} r={r} q={query}/>)}

            {showEmpty && (
              <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:8, padding:'36px 16px', color:T.neutral300 }}>
                {Ico.empty}
                <div style={{ fontSize:13, color:T.neutral500 }}>Keine Ergebnisse für „{query}“</div>
              </div>
            )}
          </div>

          {!showRecent && filtered.length > 0 && (
            <div style={{ borderTop:`1px solid ${T.neutral100}`, padding:'8px 16px', fontSize:11.5, color:T.neutral300, display:'flex', justifyContent:'space-between' }}>
              <span>{filtered.length} Ergebnis{filtered.length!==1?'se':''}</span>
              <span>↵ öffnen · Esc schließen</span>
            </div>
          )}
        </div>
      )}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<GlobalSearch/>);
</script>
</body>
</html>
