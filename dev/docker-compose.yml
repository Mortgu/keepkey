services:
  postgres:
    image: postgres:16
    container_name: keepit_postgres
    env_file:
      - .env.docker
    ports:
      - "5433:5432"
    volumes:
      - postgres_storage:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-keepit} -d ${POSTGRES_DB:-keepit}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: keepit_redis
    ports:
      - "6379:6379"
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: keepit_app
    env_file:
      - .env.docker
    ports:
      - "3000:3000"
    volumes:
      - generated_data:/app/server/generated
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

volumes:
  postgres_storage:
  generated_data: